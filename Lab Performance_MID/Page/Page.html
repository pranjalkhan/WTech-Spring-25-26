<!DOCTYPE html>
<html lang="en">

<head>
    <title>Product Management Page</title>
    <link rel="stylesheet" href="D:\Wtech Spring 25-26\WTech-Spring-25-26\Lab Performance_MID\Design\Style.css">
</head>
<body>
    <div class="container">
    <form>
        <fieldset>
            <legend>Product Management Page</legend>
            <table>
                <tr>
                    <td>
                        <label for="unitPrice">Unit Price:</label><br>
                        <input type="number" id="unitPrice" value="1000" readonly>
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="quantity">Quantity per Day:</label><br>
                        <input type="number" id="quantity" placeholder="Enter quantity per day" value="0">
                    </td>
                </tr>
                <tr>
                    <td id="errorRow" class="error"></td>
                </tr>
                <tr>
                    <td>
                        <label for="totalPrice">Total Price for 30 Days:</label><br>
                        <input type="text" id="totalPrice" value="0" readonly>
                    </td>
                </tr>
            </table>
        </fieldset>
    </form>
</div>
<script src="D:\Wtech Spring 25-26\WTech-Spring-25-26\Lab Performance_MID\JS\Validation_script.js"></script>
</body>
</html>
