<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Contact Us Form</title>
        <link rel="stylesheet"
            href="../Design/style.css">

    </head>
    <body>

        <h1>Contact us</h1>

        <form id="contactForm">
            <table>
                <!-- First & Last Name -->
                <tr>
                    <td><label for="fname">FIRST NAME</label></td>
                    <td><label for="lname">LAST NAME</label></td>
                </tr>
                <tr>
                    <td><input type="text" id="fname" name="fname"></td>
                    <td><input type="text" id="lname" name="lname"></td>
                </tr>

                <!-- Email & Phone -->
                <tr>
                    <td><label for="email">EMAIL</label></td>
                    <td><label for="phone">PHONE NUMBER</label></td>
                </tr>
                <tr>
                    <td><input type="text" id="email" name="email"></td>
                    <td><input type="number" id="phone" name="phone"
                            placeholder="Enter Phone Number"></td>
                </tr>

                <!-- Message -->
                <tr>
                    <td colspan="2"><label for="message">WHAT DO YOU HAVE IN
                            MIND</label></td>
                </tr>
                <tr>
                    <td colspan="2">
                        <textarea id="message" name="message" rows="4" cols="50"
                            placeholder="Please enter query..."></textarea>
                    </td>
                </tr>

                <!-- Submit -->
                <tr>
                    <td colspan="2" style="text-align:center;">
                        <input type="submit" value="Submit">
                    </td>
                </tr>
            </table>
        </form>

        <p id="errorMsg" style="color:red; text-align:center;"></p>

        <script src="script.js"></script>
    </body>
</html>
